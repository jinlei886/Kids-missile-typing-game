<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>字母导弹 - Letter Missile</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#000; touch-action:manipulation;
    -webkit-touch-callout:none; -webkit-user-select:none;
    user-select:none; -webkit-tap-highlight-color:transparent;
    font-family:'Courier New',monospace;
  }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(function(){
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

// ─── AUDIO ──────────────────────────────────────────
let audioCtx=null;
function initAudio(){ if(!audioCtx){ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); } if(audioCtx.state==='suspended') audioCtx.resume(); }
function playTone(freq,type,dur,vol=0.15,glide=0){
  if(!audioCtx) return; const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  if(glide) o.frequency.linearRampToValueAtTime(freq+glide,t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+dur);
}
function sfxLaunch(){ playTone(200,'sawtooth',0.3,0.1,800); }
function sfxHit(){ playTone(80,'square',0.4,0.12); playTone(600,'square',0.15,0.08,-400); }
function sfxMiss(){ playTone(300,'triangle',0.5,0.1,-200); }
function sfxCombo(){ playTone(880,'square',0.1,0.06); setTimeout(()=>playTone(1100,'square',0.1,0.06),80); }
function sfxGameOver(){ playTone(200,'sawtooth',0.8,0.15,-150); }

// ─── CANVAS ─────────────────────────────────────────
function resize(){
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
  W = window.innerWidth;
  H = window.innerHeight;
}
let W, H;
window.addEventListener('resize', resize);
resize();

// ─── STATE ──────────────────────────────────────────
const STATE = { INTRO:'intro', PLAYING:'playing', OVER:'over', REST:'rest' };
let gameState = STATE.INTRO;
let introStart = Date.now();
let score=0, combo=0, maxCombo=0, hp=3;
const MAX_HP=3;
let restEndTime=0;
const REST_KEY='missile_game_rest_end';
(function(){
  const sr=localStorage.getItem(REST_KEY);
  if(sr){ const et=parseInt(sr,10); if(Date.now()<et){ gameState=STATE.REST; restEndTime=et; } else localStorage.removeItem(REST_KEY); }
})();

// ─── STARS / CLOUDS ─────────────────────────────────
class Star {
  constructor(){ this.reset(true); }
  reset(init){
    this.x=Math.random()*W; this.y=init?Math.random()*H:-5;
    this.size=Math.random()*1.8+0.5; this.speed=this.size*0.4+0.1;
    this.twinkle=Math.random()*Math.PI*2; this.twinkleSpeed=Math.random()*0.03+0.01;
  }
  update(dt){ this.y+=this.speed*dt*30; this.twinkle+=this.twinkleSpeed*dt*30; if(this.y>H+5) this.reset(); }
  draw(ctx){ const a=0.4+Math.sin(this.twinkle)*0.4; ctx.fillStyle=`rgba(200,220,255,${a})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
}
class Cloud {
  constructor(){ this.reset(true); }
  reset(init){ this.x=init?Math.random()*W:-200; this.y=Math.random()*H*0.5+20; this.w=Math.random()*180+80; this.h=Math.random()*30+15; this.speed=Math.random()*20+10; this.alpha=Math.random()*0.06+0.02; }
  update(dt){ this.x+=this.speed*dt; if(this.x>W+300) this.reset(); }
  draw(ctx){
    ctx.fillStyle=`rgba(180,200,240,${this.alpha})`;
    ctx.beginPath(); ctx.ellipse(this.x,this.y,this.w/2,this.h/2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(this.x-this.w*0.25,this.y-this.h*0.2,this.w*0.3,this.h*0.5,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(this.x+this.w*0.2,this.y-this.h*0.15,this.w*0.25,this.h*0.45,0.2,0,Math.PI*2); ctx.fill();
  }
}
const stars=Array.from({length:120},()=>new Star());
const clouds=Array.from({length:6},()=>new Cloud());

// ─── WORDS / MATH ───────────────────────────────────
const WORDS=['CAT','DOG','CAR','BUS','SUN','HAT','BED','CUP','BOX','PEN','RED','BIG','RUN','SIT','TOP','FUN','HOT','MAP','JAM','LEG','PIG','COW','FAN','MUD','ZIP','FOX','BAT','HUG','YUM','WET'];
function randomMathProblem(){
  const type=Math.random();
  let a,b,ans;
  if(type<0.3){ a=Math.floor(Math.random()*50)+10; b=Math.floor(Math.random()*(60-a>0?60-a:10))+1; ans=a+b; return {question:`${a} + ${b} = ?`, answer:ans.toString()}; }
  else if(type<0.6){ a=Math.floor(Math.random()*40)+15; b=Math.floor(Math.random()*14)+1; ans=a-b; return {question:`${a} - ${b} = ?`, answer:ans.toString()}; }
  else { a=Math.floor(Math.random()*7)+3; b=Math.floor(Math.random()*7)+3; ans=a*b; return {question:`${a} × ${b} = ?`, answer:ans.toString()}; }
}

// ─── JET ────────────────────────────────────────────
class Jet {
  constructor(y,letter,fromRight){
    this.letter=letter; this.y=y; this.fromRight=fromRight;
    this.x=fromRight?W+80:-80; this.speed=(W+160)/15;
    this.alive=true; this.hit=false; this.escaped=false;
    this.trailParticles=[]; this.glowPhase=Math.random()*Math.PI*2;
  }
  update(dt){
    const d=this.fromRight?-1:1; this.x+=this.speed*d*dt; this.glowPhase+=dt*4;
    if(Math.random()<0.6){ const tx=this.x+(this.fromRight?55:-55); this.trailParticles.push({x:tx+(Math.random()-0.5)*8,y:this.y+(Math.random()-0.5)*10,life:1,decay:0.02+Math.random()*0.04,size:Math.random()*2+1}); }
    for(let i=this.trailParticles.length-1;i>=0;i--){ const p=this.trailParticles[i]; p.life-=p.decay*dt*60; p.x+=(this.fromRight?1:-1)*40*dt; if(p.life<=0) this.trailParticles.splice(i,1); }
    if(this.fromRight&&this.x<-100) this.escaped=true;
    if(!this.fromRight&&this.x>W+100) this.escaped=true;
  }
  draw(ctx){
    if(!this.alive) return; const x=this.x,y=this.y,d=this.fromRight?-1:1;
    for(const p of this.trailParticles){ const a=p.life*0.8; ctx.fillStyle=`rgba(100,180,255,${a})`; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); }
    ctx.save(); ctx.translate(x,y); if(d===-1) ctx.scale(-1,1);
    const ga=0.3+Math.sin(this.glowPhase)*0.15; ctx.shadowColor=`rgba(0,180,255,${ga})`; ctx.shadowBlur=15;
    const bg=ctx.createLinearGradient(0,-20,0,20); bg.addColorStop(0,'#8899aa'); bg.addColorStop(0.5,'#556677'); bg.addColorStop(1,'#334455');
    ctx.fillStyle=bg; ctx.beginPath();
    ctx.moveTo(65,0);ctx.lineTo(40,-8);ctx.lineTo(10,-10);ctx.lineTo(-20,-12);ctx.lineTo(-30,-28);ctx.lineTo(-45,-30);ctx.lineTo(-50,-12);
    ctx.lineTo(-65,-8);ctx.lineTo(-70,-3);ctx.lineTo(-65,2);ctx.lineTo(-50,5);ctx.lineTo(-45,28);ctx.lineTo(-30,26);ctx.lineTo(-20,12);ctx.lineTo(10,10);ctx.lineTo(40,8);
    ctx.closePath(); ctx.fill();
    const cg=ctx.createLinearGradient(0,-8,0,8); cg.addColorStop(0,'#aaddff'); cg.addColorStop(0.5,'#4488cc'); cg.addColorStop(1,'#224466');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.ellipse(30,0,14,8,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#88bbee'; ctx.lineWidth=1; ctx.stroke();
    const eg=ctx.createRadialGradient(-68,0,2,-68,0,18); eg.addColorStop(0,'rgba(100,200,255,0.9)'); eg.addColorStop(0.4,'rgba(50,150,255,0.5)'); eg.addColorStop(1,'rgba(0,50,200,0)');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(-66,0,18,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(200,240,255,0.8)'; ctx.beginPath(); ctx.arc(-66,0,5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
    const lx=x+(this.fromRight?-10:10),ly=y;
    const pulse=0.7+Math.sin(Date.now()/400)*0.3;
    ctx.fillStyle=`rgba(0,40,20,${pulse*0.6})`; ctx.beginPath(); ctx.arc(lx,ly,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00ff88'; ctx.shadowColor='rgba(0,255,136,0.9)'; ctx.shadowBlur=14;
    ctx.font='bold 36px "Courier New",monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.letter,lx,ly); ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,255,136,0.6)'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(lx,ly,22,0,Math.PI*2); ctx.stroke();
  }
}

// ─── UFO ────────────────────────────────────────────
class UFO {
  constructor(y,word,fromRight){
    this.word=word; this.y=y; this.fromRight=fromRight;
    this.x=fromRight?W+100:-100; this.speed=(W+200)/18;
    this.alive=true;this.hit=false;this.escaped=false;this.typedIndex=0;this.wrongFlash=0;
    this.trailParticles=[];this.glowPhase=Math.random()*Math.PI*2;this.wobble=Math.random()*Math.PI*2;
  }
  update(dt){
    const d=this.fromRight?-1:1;this.x+=this.speed*d*dt;this.glowPhase+=dt*3;this.wobble+=dt*2;
    if(this.wrongFlash>0)this.wrongFlash-=dt*3;
    if(Math.random()<0.5){this.trailParticles.push({x:this.x+(this.fromRight?30:-30)+(Math.random()-0.5)*10,y:this.y+(Math.random()-0.5)*8,life:1,decay:0.03+Math.random()*0.05,size:Math.random()*2.5+1,color:'rgba(180,100,255'});}
    for(let i=this.trailParticles.length-1;i>=0;i--){const p=this.trailParticles[i];p.life-=p.decay*dt*60;p.x+=(this.fromRight?0.5:-0.5)*30*dt;if(p.life<=0)this.trailParticles.splice(i,1);}
    if(this.fromRight&&this.x<-100)this.escaped=true;
    if(!this.fromRight&&this.x>W+100)this.escaped=true;
  }
  draw(ctx){
    if(!this.alive)return; const x=this.x,y=this.y+Math.sin(this.wobble)*4;
    for(const p of this.trailParticles){ctx.fillStyle=`${p.color},${p.life*0.6})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
    ctx.save();ctx.translate(x,y);
    const gp=0.5+Math.sin(this.glowPhase)*0.5;ctx.shadowColor=`rgba(200,100,255,${gp*0.8})`;ctx.shadowBlur=25;
    if(this.wrongFlash>0){ctx.shadowColor=`rgba(255,50,50,${this.wrongFlash})`;ctx.shadowBlur=35;}
    const dg=ctx.createLinearGradient(0,-25,0,0);dg.addColorStop(0,'#bbaadd');dg.addColorStop(1,'#665588');
    ctx.fillStyle=dg;ctx.beginPath();ctx.ellipse(0,-5,28,20,0,Math.PI,0);ctx.fill();
    const bg=ctx.createLinearGradient(0,-8,0,12);bg.addColorStop(0,'#9988bb');bg.addColorStop(0.5,'#7766aa');bg.addColorStop(1,'#443366');
    ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,2,48,12,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(200,150,255,${0.5+gp*0.5})`;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,2,48,12,0,0,Math.PI*2);ctx.stroke();
    for(let i=-3;i<=3;i++){const bo=Math.sin(this.glowPhase*5+i)>0;ctx.fillStyle=bo?`rgba(200,120,255,${0.5+gp*0.5})`:'rgba(100,60,150,0.3)';ctx.beginPath();ctx.arc(i*10,8,3,0,Math.PI*2);ctx.fill();}
    ctx.shadowBlur=0;ctx.restore();
    // Word display
    const wy=y-2,spacing=24,tw=(this.word.length-1)*spacing,sx=x-tw/2;
    for(let i=0;i<this.word.length;i++){
      const lx=sx+i*spacing,ly=wy;
      if(i<this.typedIndex){ctx.fillStyle='#00ff44';ctx.shadowColor='rgba(0,255,68,0.8)';ctx.shadowBlur=10;ctx.font='bold 30px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.word[i],lx,ly);ctx.shadowBlur=0;ctx.strokeStyle='rgba(0,255,68,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(lx-8,ly+16);ctx.lineTo(lx,ly+20);ctx.lineTo(lx+8,ly+12);ctx.stroke();}
      else if(i===this.typedIndex){const p=0.6+Math.sin(Date.now()/250)*0.4;ctx.fillStyle=`rgba(255,220,50,${p})`;ctx.shadowColor='rgba(255,220,50,0.9)';ctx.shadowBlur=16;ctx.font='bold 34px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.word[i],lx,ly);ctx.shadowBlur=0;ctx.strokeStyle=`rgba(255,220,50,${p})`;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(lx,ly,18,0,Math.PI*2);ctx.stroke();}
      else{ctx.fillStyle='rgba(150,130,180,0.5)';ctx.font='bold 26px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.word[i],lx,ly);}
    }
  }
}

// ─── MATH JET ───────────────────────────────────────
class MathJet {
  constructor(y,problem,fromRight){
    this.question=problem.question;this.answer=problem.answer;this.y=y;this.fromRight=fromRight;
    this.x=fromRight?W+80:-80;this.speed=(W+160)/14;
    this.alive=true;this.hit=false;this.escaped=false;this.playerAnswer='';this.wrongFlash=0;
    this.trailParticles=[];this.glowPhase=Math.random()*Math.PI*2;
  }
  update(dt){
    const d=this.fromRight?-1:1;this.x+=this.speed*d*dt;this.glowPhase+=dt*5;
    if(this.wrongFlash>0)this.wrongFlash-=dt*3;
    if(Math.random()<0.5){this.trailParticles.push({x:this.x+(this.fromRight?50:-50)+(Math.random()-0.5)*6,y:this.y+(Math.random()-0.5)*8,life:1,decay:0.03+Math.random()*0.05,size:Math.random()*2+0.8,color:'rgba(255,80,40'});}
    for(let i=this.trailParticles.length-1;i>=0;i--){const p=this.trailParticles[i];p.life-=p.decay*dt*60;p.x+=(this.fromRight?0.5:-0.5)*35*dt;if(p.life<=0)this.trailParticles.splice(i,1);}
    if(this.fromRight&&this.x<-100)this.escaped=true;
    if(!this.fromRight&&this.x>W+100)this.escaped=true;
  }
  draw(ctx){
    if(!this.alive)return; const x=this.x,y=this.y,d=this.fromRight?-1:1;
    for(const p of this.trailParticles){ctx.fillStyle=`${p.color},${p.life*0.7})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
    ctx.save();ctx.translate(x,y);if(d===-1)ctx.scale(-1,1);
    const fa=this.wrongFlash>0?this.wrongFlash:0,gp=0.5+Math.sin(this.glowPhase)*0.5;
    ctx.shadowColor=`rgba(255,${60-fa*30},${30-fa*20},${gp*0.8})`;ctx.shadowBlur=20;
    const bg=ctx.createLinearGradient(0,-20,0,20);bg.addColorStop(0,'#cc5544');bg.addColorStop(0.5,'#993322');bg.addColorStop(1,'#661100');
    ctx.fillStyle=bg;ctx.beginPath();
    ctx.moveTo(65,0);ctx.lineTo(40,-8);ctx.lineTo(10,-10);ctx.lineTo(-20,-12);ctx.lineTo(-30,-28);ctx.lineTo(-45,-30);ctx.lineTo(-50,-12);
    ctx.lineTo(-65,-8);ctx.lineTo(-70,-3);ctx.lineTo(-65,2);ctx.lineTo(-50,5);ctx.lineTo(-45,28);ctx.lineTo(-30,26);ctx.lineTo(-20,12);ctx.lineTo(10,10);ctx.lineTo(40,8);
    ctx.closePath();ctx.fill();
    const cg=ctx.createLinearGradient(0,-8,0,8);cg.addColorStop(0,'#ffaa88');cg.addColorStop(0.5,'#cc6644');cg.addColorStop(1,'#883322');
    ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(30,0,14,8,0,0,Math.PI*2);ctx.fill();
    const eg=ctx.createRadialGradient(-68,0,2,-68,0,18);eg.addColorStop(0,'rgba(255,150,100,0.9)');eg.addColorStop(0.4,'rgba(255,80,40,0.5)');eg.addColorStop(1,'rgba(200,20,0,0)');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(-66,0,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,200,180,0.8)';ctx.beginPath();ctx.arc(-66,0,5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
    // Question box (dynamic width)
    const qx=x+(this.fromRight?-15:15),qy=y;
    ctx.font='bold 28px "Courier New",monospace'; ctx.textAlign='center';
    const tw=ctx.measureText(this.question).width||140, bw=Math.max(200,tw+60), bh=48;
    const qp=0.6+Math.sin(Date.now()/400)*0.4;
    ctx.fillStyle=`rgba(60,10,10,${qp*0.7})`;ctx.beginPath();ctx.roundRect(qx-bw/2,qy-bh/2,bw,bh,12);ctx.fill();
    ctx.strokeStyle=`rgba(255,100,50,${qp*0.8})`;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(qx-bw/2,qy-bh/2,bw,bh,12);ctx.stroke();
    ctx.fillStyle='#ffcc88';ctx.shadowColor='rgba(255,150,50,0.8)';ctx.shadowBlur=8;
    ctx.fillText(this.question,qx-10,qy);ctx.shadowBlur=0;
    if(this.playerAnswer.length>0){ctx.fillStyle='#ffff00';ctx.shadowColor='rgba(255,255,0,0.8)';ctx.shadowBlur=10;ctx.font='bold 32px "Courier New",monospace';ctx.fillText(this.playerAnswer,qx+bw*0.3,qy);ctx.shadowBlur=0;}
  }
}

// ─── MISSILE ────────────────────────────────────────
class Missile {
  constructor(target,lx,ly){this.target=target;this.x=lx;this.y=ly;this.speed=450;this.alive=true;this.trailParticles=[];}
  update(dt){
    if(!this.target||!this.target.alive){this.alive=false;return;}
    const tx=this.target.x,ty=this.target.y,dx=tx-this.x,dy=ty-this.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<25){this.alive=false;this.target.hit=true;this.target.alive=false;return;}
    const m=this.speed*dt;if(m>=dist){this.x=tx;this.y=ty;this.alive=false;this.target.hit=true;this.target.alive=false;}
    else{this.x+=(dx/dist)*m;this.y+=(dy/dist)*m;}
    this.trailParticles.push({x:this.x+(Math.random()-0.5)*3,y:this.y+(Math.random()-0.5)*3,life:1,decay:0.1+Math.random()*0.15});
    for(let i=this.trailParticles.length-1;i>=0;i--){const p=this.trailParticles[i];p.life-=p.decay*dt*60;if(p.life<=0)this.trailParticles.splice(i,1);}
  }
  draw(ctx){
    for(const p of this.trailParticles){ctx.fillStyle=`rgba(255,200,100,${p.life})`;ctx.beginPath();ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2);ctx.fill();}
    ctx.save();ctx.shadowColor='rgba(255,150,50,0.8)';ctx.shadowBlur=12;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,8);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.3,'#ffdd88');g.addColorStop(0.6,'#ff8800');g.addColorStop(1,'rgba(255,50,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(this.x,this.y,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}

// ─── EXPLOSION / FLOATING TEXT ──────────────────────
class Explosion {
  constructor(x,y){
    this.particles=[]; const n=35;
    for(let i=0;i<n;i++){const an=(Math.PI*2/n)*i+Math.random()*0.3,sp=80+Math.random()*250;this.particles.push({x,y,vx:Math.cos(an)*sp,vy:Math.sin(an)*sp,life:1,decay:0.01+Math.random()*0.025,size:1.5+Math.random()*4,color:['#ff4400','#ff8800','#ffcc00','#ffffff'][Math.floor(Math.random()*4)]});}
    this.ringRadius=5;this.ringLife=1;this.x=x;this.y=y;this.alive=true;
  }
  update(dt){
    let any=false;
    for(const p of this.particles){p.life-=p.decay*dt*60;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=100*dt;if(p.life>0)any=true;}
    this.ringRadius+=300*dt;this.ringLife-=1.2*dt; if(!any&&this.ringLife<=0)this.alive=false;
  }
  draw(ctx){
    if(this.ringLife>0){ctx.strokeStyle=`rgba(255,150,50,${this.ringLife*0.6})`;ctx.lineWidth=3*this.ringLife;ctx.beginPath();ctx.arc(this.x,this.y,this.ringRadius,0,Math.PI*2);ctx.stroke();}
    for(const p of this.particles){if(p.life<=0)continue;const a=p.life;let fc=p.color;if(p.color==='#ffffff')fc=`rgba(255,255,255,${a})`;else fc=fc.replace(')',`,${a})`);ctx.fillStyle=fc;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();}
  }
}
class FloatingText {
  constructor(x,y,t,c='#ffdd00'){this.x=x;this.y=y;this.text=t;this.color=c;this.life=1;this.alive=true;}
  update(dt){this.y-=50*dt;this.life-=0.8*dt;if(this.life<=0)this.alive=false;}
  draw(ctx){

    ctx.fillStyle=fc;ctx.font='bold 24px "Courier New",monospace';ctx.textAlign='center';ctx.fillText(this.text,this.x,this.y);
  }
}

// ─── GAME OBJECTS ───────────────────────────────────
let jets=[],ufos=[],mathJets=[],missiles=[],explosions=[],floatingTexts=[];

// ─── HANDLE INPUT (keyboard + touch) ────────────────
function handleInput(key){
  initAudio(); const upperKey=key.toUpperCase();
  if(gameState!==STATE.PLAYING) return;
  // Number keys for Math Jet
  if(key>='0'&&key<='9'){
    const am=mathJets.find(m=>m.alive&&!m.hit&&!m.escaped);
    if(am){am.playerAnswer+=key; if(am.playerAnswer===am.answer){missiles.push(new Missile(am,getLauncherX(),getLauncherY()));sfxLaunch();}else if(am.playerAnswer.length>=am.answer.length){am.wrongFlash=1;am.playerAnswer='';sfxMiss();screenFlash=Math.max(screenFlash,0.15);}}
    return;
  }
  if(upperKey<'A'||upperKey>'Z') return;
  // UFO word
  const au=ufos.find(u=>u.alive&&!u.hit&&!u.escaped);
  if(au){const nd=au.word[au.typedIndex];if(upperKey===nd){au.typedIndex++;if(au.typedIndex>=au.word.length){missiles.push(new Missile(au,getLauncherX(),getLauncherY()));sfxLaunch();}else{playTone(660,'sine',0.1,0.06);}}else{au.wrongFlash=1;au.typedIndex=0;sfxMiss();screenFlash=Math.max(screenFlash,0.1);}return;}
  // Regular jets
  const mj=jets.filter(j=>j.alive&&!j.hit&&j.letter===upperKey);
  if(mj.length>0){mj.sort((a,b)=>{const ad=a.fromRight?a.x:W-a.x,bd=b.fromRight?b.x:W-b.x;return ad-bd;});missiles.push(new Missile(mj[0],getLauncherX(),getLauncherY()));sfxLaunch();}
  else{sfxMiss();screenFlash=Math.max(screenFlash,0.15);}
}

// ─── TOUCH / CLICK HANDLER ──────────────────────────
function getCanvasPos(e){
  const rect=canvas.getBoundingClientRect();
  return {x:(e.clientX||(e.touches&&e.touches[0].clientX)||0)-rect.left,y:(e.clientY||(e.touches&&e.touches[0].clientY)||0)-rect.top};
}
function processTap(pos){
  initAudio();
  // Check touch buttons
  for(const btn of touchButtons){
    if(pos.x>=btn.x&&pos.x<=btn.x+btn.w&&pos.y>=btn.y&&pos.y<=btn.y+btn.h){
      if(btn.key==='Backspace'){
        const am=mathJets.find(m=>m.alive&&!m.hit&&!m.escaped);
        if(am&&am.playerAnswer.length>0) am.playerAnswer=am.playerAnswer.slice(0,-1);
      } else { handleInput(btn.key); }
      return;
    }
  }
  // Tap-to-start on intro / rest screen
  if(gameState===STATE.INTRO){startGame();return;}
  if((gameState===STATE.REST||gameState===STATE.OVER)&&Date.now()>=restEndTime){startGame();return;}
}
canvas.addEventListener('touchstart',(e)=>{e.preventDefault();processTap(getCanvasPos(e));},{passive:false});
canvas.addEventListener('mousedown',(e)=>{e.preventDefault();processTap(getCanvasPos(e));});

// ─── KEYBOARD ───────────────────────────────────────
window.addEventListener('keydown',(e)=>{
  if(e.repeat) return;
  initAudio();
  // Backspace for math
  if(e.key==='Backspace'){
    const am=mathJets.find(m=>m.alive&&!m.hit&&!m.escaped);
    if(am&&am.playerAnswer.length>0){am.playerAnswer=am.playerAnswer.slice(0,-1);e.preventDefault();}
    return;
  }
  if(gameState===STATE.INTRO){startGame();return;}
  if((gameState===STATE.REST||gameState===STATE.OVER)&&Date.now()>=restEndTime){startGame();return;}
  handleInput(e.key);
});

function startGame(){
  initAudio(); gameState=STATE.PLAYING; score=0; combo=0; maxCombo=0; hp=MAX_HP;
  jets=[];ufos=[];mathJets=[];missiles=[];explosions=[];floatingTexts=[];
  spawnTimer=1.5; screenFlash=0; pendingSpecialSpawn=null; hpRecoveryMilestone=20000;
}

}

function onEntityEscaped(e){if(e.escaped&&e.alive){e.alive=false;onLoseLife(e.x,e.y);}}
function handleEntityDestroyed(t){
  const tx=t.x||0,ty=t.y||0; explosions.push(new Explosion(tx,ty)); let pts;
  if(t instanceof UFO){pts=500;combo++;if(combo>maxCombo)maxCombo=combo;floatingTexts.push(new FloatingText(tx,ty,'+500 🛸!','#cc88ff'));sfxCombo();}
  else if(t instanceof MathJet){pts=300;combo++;if(combo>maxCombo)maxCombo=combo;floatingTexts.push(new FloatingText(tx,ty,'+300 🔢!','#ff8844'));sfxCombo();}
  else{combo++;if(combo>maxCombo)maxCombo=combo;pts=100*Math.min(combo,5);floatingTexts.push(new FloatingText(tx,ty,combo>1?`+${pts} x${combo}`:`+${pts}`,combo>2?'#ff8800':'#ffdd00'));sfxHit();if(combo>1&&combo%3===0)sfxCombo();}
  score+=pts;
  if(score>=hpRecoveryMilestone&&hp<MAX_HP){hp++;floatingTexts.push(new FloatingText(W/2,H*0.4,'+1 ❤️ 恢复!','#00ff88'));sfxCombo();hpRecoveryMilestone+=20000;}
  if(combo>=10&&pendingSpecialSpawn!=='ufo')pendingSpecialSpawn='ufo';
  else if(combo>=5&&pendingSpecialSpawn!=='math'&&pendingSpecialSpawn!=='ufo')pendingSpecialSpawn='math';
}

// ─── TOUCH BUTTONS ──────────────────────────────────
function drawTouchButtons(){
  touchButtons=[]; // reset each frame
  const lx=getLauncherX();
  const activeJets=jets.filter(j=>j.alive&&!j.hit&&!j.escaped);
  const activeUFO=ufos.find(u=>u.alive&&!u.hit&&!u.escaped);
  const activeMath=mathJets.find(m=>m.alive&&!m.hit&&!m.escaped);

  // Button area: bottom portion of screen
  const areaTop=H*0.75;
  const areaH=H-areaTop-10;

  // ── UFO word buttons ──
  if(activeUFO){
    const w=activeUFO.word, ti=activeUFO.typedIndex, n=w.length;
    const btnSize=Math.min(64,(W-40)/n-8);
    const totalW=n*(btnSize+8)-8;
    let sx=(W-totalW)/2;
    const by=areaTop+Math.max(10,(areaH-btnSize)/2);

    ctx.fillStyle='rgba(200,120,255,0.4)'; ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('依次点击字母拼单词!',lx,by-14);

    for(let i=0;i<n;i++){
      const bx=sx+i*(btnSize+8);
      const isCur=(i===ti), isDone=i<ti;
      const pulse=0.5+Math.sin(Date.now()/400+i)*0.5;

      ctx.fillStyle=isDone?'rgba(0,180,40,0.7)':isCur?`rgba(180,80,255,${0.5+pulse*0.4})`:'rgba(30,20,50,0.4)';
      ctx.shadowColor=isCur?`rgba(200,120,255,${0.7+pulse*0.3})`:isDone?'rgba(0,255,68,0.5)':'transparent';
      ctx.shadowBlur=isCur?14:isDone?6:0;
      ctx.beginPath();ctx.roundRect(bx,by,btnSize,btnSize,14);ctx.fill();

      ctx.strokeStyle=isCur?'rgba(200,140,255,0.9)':isDone?'rgba(0,255,68,0.6)':'rgba(100,80,130,0.35)';
      ctx.lineWidth=isCur?3:2;ctx.beginPath();ctx.roundRect(bx,by,btnSize,btnSize,14);ctx.stroke();
      ctx.shadowBlur=0;

      ctx.fillStyle=isCur?'#ffdd44':isDone?'#00ff44':'rgba(150,120,180,0.5)';
      ctx.font=`bold ${btnSize*0.5}px "Courier New",monospace`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(w[i],bx+btnSize/2,by+btnSize/2);

      if(isCur) touchButtons.push({x:bx,y:by,w:btnSize,h:btnSize,key:w[i]});
    }
    return;
  }

  // ── Math number pad ──
  if(activeMath){
    const numKeys=['1','2','3','4','5','6','7','8','9','⌫','0'];
    const cols=4, rows=3;
    const btnW=Math.min(72,(W-40)/cols-6);
    const btnH=Math.min(60,btnW*0.85);
    const totalW=cols*(btnW+6)-6;
    const totalH=rows*(btnH+6)-6;
    let sx=(W-totalW)/2;
    const sy=areaTop+Math.max(5,(areaH-totalH)/2)-8;

    ctx.fillStyle='rgba(255,140,80,0.4)'; ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('点击数字回答!',lx,sy-12);

    for(let i=0;i<numKeys.length;i++){
      const col=i%cols, row=Math.floor(i/cols);
      const bx=sx+col*(btnW+6), by=sy+row*(btnH+6);
      const pulse=0.5+Math.sin(Date.now()/300+col+row)*0.4;

      ctx.fillStyle=`rgba(255,80,30,${0.2+pulse*0.3})`;ctx.shadowColor='rgba(255,100,50,0.6)';ctx.shadowBlur=8;
      ctx.beginPath();ctx.roundRect(bx,by,btnW,btnH,10);ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(255,140,80,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by,btnW,btnH,10);ctx.stroke();

      ctx.fillStyle='#ffffff';ctx.font=`bold ${btnW*0.45}px "Courier New",monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
      const label=numKeys[i]==='⌫'?'⌫':numKeys[i];
      ctx.fillText(label,bx+btnW/2,by+btnH/2);

      if(numKeys[i]==='⌫') touchButtons.push({x:bx,y:by,w:btnW,h:btnH,key:'Backspace'});
      else touchButtons.push({x:bx,y:by,w:btnW,h:btnH,key:numKeys[i]});
    }
    // Also handle backspace via touch button
    const origInput=handleInput;
    // Add backspace handling
    return;
  }

  // ── Regular letter buttons ──
  const letters=activeJets.map(j=>j.letter);
  if(letters.length===0){
    ctx.fillStyle='rgba(150,180,200,0.3)';ctx.font='13px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillText('等待敌机出现...',lx,areaTop+areaH/2);
    return;
  }

  const n=letters.length;
  const btnSize=Math.min(72,(W-40)/n-12);
  const totalW=n*btnSize+(n-1)*12;
  let sx=(W-totalW)/2;
  const by=areaTop+Math.max(10,(areaH-btnSize)/2);

  ctx.fillText('点击字母发射导弹!',lx,by-14);

  for(let i=0;i<n;i++){
    const bx=sx+i*(btnSize+12);
    const pulse=0.5+Math.sin(Date.now()/350+i)*0.5;
    ctx.fillStyle=`rgba(0,200,80,${0.4+pulse*0.4})`;ctx.shadowColor='rgba(0,255,136,0.8)';ctx.shadowBlur=12;
    ctx.beginPath();ctx.roundRect(bx,by,btnSize,btnSize,16);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=`rgba(0,255,136,${0.7+pulse*0.3})`;ctx.lineWidth=3;ctx.beginPath();ctx.roundRect(bx,by,btnSize,btnSize,16);ctx.stroke();

    ctx.fillStyle='#ffffff';ctx.font=`bold ${btnSize*0.5}px "Courier New",monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(letters[i],bx+btnSize/2,by+btnSize/2);
    touchButtons.push({x:bx,y:by,w:btnSize,h:btnSize,key:letters[i]});
  }
}

  const rem=Math.max(0,Math.ceil((restEndTime-Date.now())/1000));
  const mm=Math.floor(rem/60),ss=rem%60,ts=`${mm}:${ss.toString().padStart(2,'0')}`;
  ctx.fillStyle='#ff8888';ctx.shadowColor='rgba(255,100,100,0.6)';ctx.shadowBlur=15;
  ctx.font='bold 36px "Courier New",monospace';ctx.textAlign='center';ctx.fillText('休 息 一 下',W/2,H*0.32);ctx.shadowBlur=0;
  ctx.fillStyle='#ccccee';ctx.font='18px "Courier New",monospace';ctx.fillText('保护眼睛，休息5分钟后再玩哦~',W/2,H*0.40);
  ctx.fillStyle='#ffffff';ctx.font='bold 56px "Courier New",monospace';ctx.fillText(ts,W/2,H*0.52);
  if(rem<=0){
    const pulse=0.6+Math.sin(Date.now()/600)*0.4;
    ctx.fillStyle=`rgba(0,255,136,${pulse})`;ctx.font='bold 28px "Courier New",monospace';
    ctx.fillText('点击屏幕 重新开始',W/2,H*0.65);
    // Draw tap button
    const bw=220,bh=56,bx=W/2-bw/2,by2=H*0.64-bh/2-10;
    ctx.fillStyle=`rgba(0,255,136,${0.15+pulse*0.15})`;ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,16);ctx.fill();
    ctx.strokeStyle=`rgba(0,255,136,${0.5+pulse*0.3})`;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by2,bw,bh,16);ctx.stroke();
  }
  ctx.fillStyle='rgba(200,200,220,0.5)';ctx.font='14px "Courier New",monospace';ctx.textAlign='center';
  ctx.fillText(`本次得分: ${score}  |  最高连击: ${maxCombo}`,W/2,H*0.74);
}

// ─── GAME LOOP ──────────────────────────────────────
let lastTime=performance.now();
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  let dt=(ts-lastTime)/1000; if(dt>0.1)dt=0.1; lastTime=ts;
  update(dt); render();
}

function update(dt){
  for(const s of stars)s.update(dt);
  for(const c of clouds)c.update(dt);
  if(screenFlash>0)screenFlash-=dt*1.5;

  // Auto-start from intro after 2.5 seconds
  if(gameState===STATE.INTRO && Date.now()-introStart>2500){ startGame(); }

  if(gameState===STATE.PLAYING){
    const ac=jets.filter(j=>j.alive&&!j.escaped).length+ufos.filter(u=>u.alive&&!u.escaped).length+mathJets.filter(m=>m.alive&&!m.escaped).length;
    if(ac===0){spawnTimer-=dt;if(spawnTimer<=0){spawnWave();spawnTimer=2+Math.random()*1.5;}}
    for(const j of jets)j.update(dt);
    for(const u of ufos)u.update(dt);
    for(const m of mathJets)m.update(dt);
    for(const m of missiles)m.update(dt);
    for(const j of jets){if(j.escaped&&j.alive)onEntityEscaped(j);}
    for(const u of ufos){if(u.escaped&&u.alive)onEntityEscaped(u);}
    for(const m of mathJets){if(m.escaped&&m.alive)onEntityEscaped(m);}
    for(const m of missiles){if(!m.alive&&m.target&&m.target.hit)handleEntityDestroyed(m.target);}
    for(const e of explosions)e.update(dt);
    for(const f of floatingTexts)f.update(dt);
    jets=jets.filter(j=>j.alive);ufos=ufos.filter(u=>u.alive);mathJets=mathJets.filter(m=>m.alive);
    missiles=missiles.filter(m=>m.alive);explosions=explosions.filter(e=>e.alive);floatingTexts=floatingTexts.filter(f=>f.alive);
  }
  for(const e of explosions)e.update(dt);
  explosions=explosions.filter(e=>e.alive);
  for(const f of floatingTexts)f.update(dt);
  floatingTexts=floatingTexts.filter(f=>f.alive);
  if((gameState===STATE.REST||gameState===STATE.OVER)&&Date.now()>=restEndTime){if(gameState===STATE.REST)localStorage.removeItem(REST_KEY);}
}

function render(){
  ctx.clearRect(0,0,W,H);
  const bgGrad=ctx.createLinearGradient(0,0,0,H);bgGrad.addColorStop(0,'#0a0a1a');bgGrad.addColorStop(0.5,'#0d1130');bgGrad.addColorStop(1,'#0a0f25');ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);
  for(const s of stars)s.draw(ctx);
  for(const c of clouds)c.draw(ctx);
  for(const j of jets)j.draw(ctx);
  for(const u of ufos)u.draw(ctx);
  for(const m of mathJets)m.draw(ctx);
  for(const m of missiles)m.draw(ctx);
  for(const e of explosions)e.draw(ctx);
  for(const f of floatingTexts)f.draw(ctx);
  drawGround();
  if(gameState===STATE.PLAYING){drawTargetPrompt();drawTouchButtons();drawHUD();}
  if(screenFlash>0){ctx.fillStyle=`rgba(255,50,30,${screenFlash*0.3})`;ctx.fillRect(0,0,W,H);}
  if(gameState===STATE.INTRO)drawIntroScreen();
  if(gameState===STATE.REST||gameState===STATE.OVER)drawRestScreen();
}

// ─── INIT ───────────────────────────────────────────
resize();
requestAnimationFrame(gameLoop);
document.addEventListener('visibilitychange',()=>{if(document.hidden)return;if(gameState===STATE.REST&&Date.now()>=restEndTime){localStorage.removeItem(REST_KEY);gameState=STATE.INTRO;}});

console.log('🚀 字母导弹游戏已就绪！自动开始，支持触屏和键盘！');
})();
</script>
